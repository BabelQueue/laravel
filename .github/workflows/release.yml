name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  # See ci.yml: lets the validate step resolve advisory-flagged Laravel 11.x so
  # tests run against the full supported range. Revisit once 11.x is patched.
  COMPOSER_NO_SECURITY_BLOCKING: "1"

jobs:
  validate:
    name: Validate (tests green before publishing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, json, sockets, bcmath
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

  coverage:
    name: Coverage gate (>=90%)
    runs-on: ubuntu-latest
    # Mirrors ci.yml's coverage job: a <90% tag must never publish. The Redis
    # driver round-trip test needs a real Redis (predis); the RabbitMQ driver is
    # covered with a mocked AMQP channel, so no broker service is needed for it.
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      BABELQUEUE_TEST_REDIS: redis://localhost:6379
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, json, sockets, bcmath
          coverage: pcov
          tools: composer:v2
      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress
      - name: Tests with coverage
        run: vendor/bin/phpunit --coverage-clover=coverage.xml
      - name: Enforce coverage gate
        run: php bin/check-coverage.php coverage.xml 90

  release:
    name: Publish
    needs: [validate, coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      # Packagist normally auto-updates via its GitHub webhook. If you instead
      # set PACKAGIST_USERNAME / PACKAGIST_TOKEN secrets, this pings its API.
      - name: Notify Packagist (optional)
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          if [ -n "$PACKAGIST_TOKEN" ]; then
            curl -sf -XPOST -H 'content-type:application/json' \
              "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}" \
              -d '{"repository":{"url":"https://github.com/babelqueue/laravel"}}'
          else
            echo "Packagist secrets not set — relying on the Packagist GitHub webhook."
          fi
