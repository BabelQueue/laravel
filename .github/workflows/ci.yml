name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Composer 2.9+ excludes advisory-affected versions during resolution. The
  # entire Laravel 11.x line (through v11.54.0) is still flagged by advisory
  # PKSA-mdq4-51ck-6kdq with no patched 11.x release, which otherwise breaks the
  # Testbench ^9 (Laravel 11) matrix legs. We knowingly test compatibility across
  # the supported framework range here (this is CI, not a deployment).
  # Re-checked 2026-06-06: still required. Revisit (and drop this) once a patched
  # Laravel 11.x clears PKSA-mdq4-51ck-6kdq.
  COMPOSER_NO_SECURITY_BLOCKING: "1"

jobs:
  test:
    name: PHP ${{ matrix.php }} · Testbench ${{ matrix.testbench }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        testbench: ['^9.0', '^10.0']
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, sockets, bcmath
          coverage: none
          tools: composer:v2

      - name: Constrain test harness (drives the Laravel version)
        run: composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
