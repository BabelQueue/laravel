name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Laravel 11.x currently carries open security advisories, and Composer 2.9+
  # excludes advisory-affected versions during resolution — which breaks the
  # Testbench ^9 (Laravel 11) matrix legs. We knowingly test compatibility
  # against the supported framework range here (this is CI, not a deployment).
  # Revisit once Laravel 11.x ships patched releases.
  COMPOSER_NO_SECURITY_BLOCKING: "1"

jobs:
  test:
    name: PHP ${{ matrix.php }} · Testbench ${{ matrix.testbench }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        testbench: ['^9.0', '^10.0']
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, sockets, bcmath
          coverage: none
          tools: composer:v2

      - name: Constrain test harness (drives the Laravel version)
        run: composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
